resources:
  jobs:
    gorda_ridge_pipeline:
      name: "[${bundle.target}] Gorda Ridge Pipeline"
      max_concurrent_runs: 1
      environments:
        - environment_key: serverless
          spec:
            environment_version: "5"
            dependencies:
              - matplotlib
              - seaborn
              - scikit-learn
              - mlflow

      tasks:
        - task_key: ingest
          environment_key: serverless
          notebook_task:
            notebook_path: ../notebooks/gorda_ridge/00_ingest.py

        - task_key: process
          depends_on:
            - task_key: ingest
          environment_key: serverless
          notebook_task:
            notebook_path: ../notebooks/gorda_ridge/01_process.py

        - task_key: eda
          depends_on:
            - task_key: process
          environment_key: serverless
          notebook_task:
            notebook_path: ../notebooks/gorda_ridge/02_eda.py

        - task_key: ml
          depends_on:
            - task_key: process
          environment_key: serverless
          notebook_task:
            notebook_path: ../notebooks/gorda_ridge/03_ml.py
            base_parameters:
              experiment_path: "/Shared/gordaridge"
